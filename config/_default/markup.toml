# -- Markup --
# Required by Blowfish; tuned for code-heavy LiteX articles.

[goldmark]
  [goldmark.parser]
    wrapStandAloneImageWithinParagraph = false

    [goldmark.parser.attribute]
      block = true

  [goldmark.renderer]
    unsafe = true

  [goldmark.extensions]
    [goldmark.extensions.passthrough]
      enable = true
      [goldmark.extensions.passthrough.delimiters]
        block = [['\[', '\]'], ['$$', '$$']]
        inline = [['\(', '\)']]

[highlight]
  noClasses = false
  lineNumbersInTable = true
  tabWidth = 4

[tableOfContents]
  startLevel = 2
  endLevel = 4
