# -- LiteX blog theme options (Blowfish params) --

colorScheme = "litex"
defaultAppearance = "dark"      # LiteX is dark-first (brand paper is #171814)
autoSwitchAppearance = true

enableA11y = true
enableSearch = true
enableCodeCopy = true

replyByEmail = false

disableImageOptimization = false
fingerprintAlgorithm = "sha512"

[header]
  layout = "fixed-fill-blur"

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = true
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "custom"             # we ship layouts/partials/home/custom.html
  showRecent = true
  showRecentItems = 5
  showMoreLink = true
  showMoreLinkDest = "posts"
  cardView = true

[article]
  showDate = true
  showViews = false
  showLikes = false
  showDateUpdated = false
  showAuthor = true
  showHero = true
  heroStyle = "background"       # big cover image, LiteX style
  layoutBackgroundBlur = true
  showBreadcrumbs = true
  showDraft = false
  showEdit = false
  showHeadingAnchors = true
  showPagination = true
  invertPagination = false
  showReadingTime = true
  showTableOfContents = true
  showTaxonomies = true
  showAuthorsBadges = false
  showWordCount = true
  showSummary = true
  sharingLinks = ["mastodon", "twitter", "reddit", "linkedin", "email"]
  showZenMode = false

[list]
  showHero = false
  showBreadcrumbs = false
  showSummary = true
  showTableOfContents = false
  showCards = true
  groupByYear = true
  cardView = true
  cardViewScreenWidth = false

[sitemap]
  excludedKinds = ["taxonomy", "term"]

[taxonomy]
  showTermCount = true

[term]
  showHero = false
  showBreadcrumbs = true
  showSummary = true
  showTableOfContents = false
  showPagination = true
