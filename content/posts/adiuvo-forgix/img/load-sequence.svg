<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 320" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <style>
      .paper { fill:#0f1218; }
      .t     { fill:#ffffff; font-size:16px; font-weight:700; }
      .lbl   { fill:#cfd2cc; font-size:12.5px; }
      .sub   { fill:#8e96a2; font-size:11px; }
      .py    { fill:#102a33; stroke:#22d3ee; stroke-width:2.5; }
      .pytxt { fill:#67e8f9; font-size:13px; font-weight:700; }
      .box   { fill:#1c2129; stroke:#2EAADC; stroke-width:1.8; }
      .step  { fill:#2EAADC; font-size:11px; font-weight:700; }
      .arr   { fill:none; stroke:#2EAADC; stroke-width:2.5; marker-end:url(#a); }
    </style>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2EAADC"/></marker>
  </defs>

  <rect class="paper" x="0" y="0" width="980" height="320"/>
  <text class="t" x="490" y="34" text-anchor="middle" fill="#2EAADC">Loading the Trion from MicroPython (passive x1)</text>

  <!-- steps -->
  <text class="step" x="115" y="82" text-anchor="middle">1</text>
  <rect class="box" x="30" y="90" width="170" height="70" rx="9"/>
  <text class="lbl" x="115" y="118" text-anchor="middle">OSC_EN = 1</text>
  <text class="sub" x="115" y="138" text-anchor="middle">wake the FPGA clock</text>

  <line class="arr" x1="200" y1="125" x2="216" y2="125"/>

  <text class="step" x="305" y="82" text-anchor="middle">2</text>
  <rect class="box" x="220" y="90" width="170" height="70" rx="9"/>
  <text class="lbl" x="305" y="113" text-anchor="middle">CS_N low, then</text>
  <text class="lbl" x="305" y="129" text-anchor="middle">CRESET_N pulse</text>
  <text class="sub" x="305" y="148" text-anchor="middle">enter passive x1</text>

  <line class="arr" x1="390" y1="125" x2="406" y2="125"/>

  <text class="step" x="495" y="82" text-anchor="middle">3</text>
  <rect class="box" x="410" y="90" width="170" height="70" rx="9"/>
  <text class="lbl" x="495" y="113" text-anchor="middle">stream bitstream</text>
  <text class="sub" x="495" y="131" text-anchor="middle">SPI mode 3 @ 8 MHz</text>
  <text class="sub" x="495" y="147" text-anchor="middle">4 KiB chunks from /remote</text>

  <line class="arr" x1="580" y1="125" x2="596" y2="125"/>

  <text class="step" x="685" y="82" text-anchor="middle">4</text>
  <rect class="box" x="600" y="90" width="170" height="70" rx="9"/>
  <text class="lbl" x="685" y="118" text-anchor="middle">32 zero bytes</text>
  <text class="sub" x="685" y="138" text-anchor="middle">extra clocks to finish</text>

  <line class="arr" x1="770" y1="125" x2="786" y2="125"/>

  <text class="step" x="875" y="82" text-anchor="middle">5</text>
  <rect class="box" x="790" y="90" width="160" height="70" rx="9"/>
  <text class="lbl" x="870" y="118" text-anchor="middle">DONE high?</text>
  <text class="sub" x="870" y="138" text-anchor="middle">then check STATUS</text>

  <!-- afterwards -->
  <line class="arr" x1="870" y1="160" x2="870" y2="200"/>
  <rect class="py" x="700" y="204" width="250" height="56" rx="9"/>
  <text class="pytxt" x="825" y="228" text-anchor="middle">same pins become SPIBone</text>
  <text class="sub"   x="825" y="247" text-anchor="middle">CS_N / SCK / DATA, from Python</text>

  <text class="sub" x="365" y="235" text-anchor="middle">The bitstream is read through mpremote mount: it never touches RP2350 flash.</text>
  <text class="sub" x="365" y="253" text-anchor="middle">.bin fast path when present, Efinity .hex parsed on the fly otherwise.</text>
</svg>
