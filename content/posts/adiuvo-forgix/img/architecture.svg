<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <style>
      .paper { fill:#0f1218; }
      .t     { fill:#ffffff; font-size:16px; font-weight:700; }
      .lbl   { fill:#cfd2cc; font-size:12.5px; }
      .sub   { fill:#8e96a2; font-size:11px; }
      .py    { fill:#102a33; stroke:#22d3ee; stroke-width:2.5; }
      .pytxt { fill:#67e8f9; font-size:13px; font-weight:700; }
      .box   { fill:#1c2129; stroke:#2EAADC; stroke-width:1.8; }
      .big   { fill:#161b22; stroke:#2EAADC; stroke-width:2.5; }
      .host  { fill:#161b22; stroke:#8e96a2; stroke-width:1.5; stroke-dasharray:5 4; }
      .wire  { fill:none; stroke:#2EAADC; stroke-width:2.5; marker-end:url(#a); }
      .wire2 { fill:none; stroke:#22d3ee; stroke-width:2.5; marker-end:url(#c); marker-start:url(#cs); }
      .cfg   { fill:none; stroke:#8e96a2; stroke-width:1.8; stroke-dasharray:6 4; marker-end:url(#g); }
      .down  { fill:none; stroke:#2EAADC; stroke-width:2; marker-end:url(#a); }
    </style>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2EAADC"/></marker>
    <marker id="c" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#22d3ee"/></marker>
    <marker id="cs" markerWidth="9" markerHeight="9" refX="0" refY="3" orient="auto"><path d="M7,0 L0,3 L7,6 Z" fill="#22d3ee"/></marker>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8e96a2"/></marker>
  </defs>

  <rect class="paper" x="0" y="0" width="980" height="560"/>
  <text class="t" x="490" y="34" text-anchor="middle" fill="#2EAADC">Three wires from MicroPython into a CPU-less LiteX SoC</text>

  <!-- Host PC (bitstream over USB) -->
  <rect class="host" x="50" y="60" width="240" height="46" rx="9"/>
  <text class="lbl" x="170" y="79" text-anchor="middle">Host PC · mpremote mount</text>
  <text class="sub" x="170" y="96" text-anchor="middle">bitstream served over USB, no flash</text>
  <line class="cfg" x1="170" y1="106" x2="170" y2="146"/>

  <!-- RP2350 -->
  <rect class="big" x="40" y="150" width="260" height="330" rx="12"/>
  <text class="t"   x="170" y="178" text-anchor="middle">RP2350</text>
  <text class="sub" x="170" y="196" text-anchor="middle">MicroPython v1.28.0</text>

  <rect class="box" x="60" y="212" width="220" height="52" rx="9"/>
  <text class="lbl" x="170" y="233" text-anchor="middle">fpga_loader.py</text>
  <text class="sub" x="170" y="250" text-anchor="middle">passive x1 · SPI mode 3 · 8 MHz</text>

  <rect class="py" x="60" y="280" width="220" height="52" rx="9"/>
  <text class="pytxt" x="170" y="301" text-anchor="middle">spibone3.py</text>
  <text class="sub" x="170" y="318" text-anchor="middle">bit-banged 3-wire SPIBone</text>

  <rect class="box" x="60" y="348" width="220" height="52" rx="9"/>
  <text class="lbl" x="170" y="369" text-anchor="middle">csr.py</text>
  <text class="sub" x="170" y="386" text-anchor="middle">register map, generated from csr.csv</text>

  <rect class="box" x="60" y="416" width="220" height="44" rx="9"/>
  <text class="lbl" x="170" y="442" text-anchor="middle" font-size="11.5">test_forgix.py · demo_forgix.py</text>

  <!-- Efinix FPGA -->
  <rect class="big" x="650" y="110" width="290" height="370" rx="12"/>
  <text class="t"   x="795" y="138" text-anchor="middle">Efinix Trion T8</text>
  <text class="sub" x="795" y="156" text-anchor="middle">T8F49C2 · LiteX SoCMini @ 32 MHz · no CPU</text>

  <rect class="py" x="670" y="180" width="250" height="100" rx="9"/>
  <text class="pytxt" x="795" y="222" text-anchor="middle">SPIBone bridge</text>
  <text class="sub"   x="795" y="242" text-anchor="middle">wires=3 · Wishbone master</text>

  <line class="down" x1="795" y1="280" x2="795" y2="296"/>

  <rect class="box" x="670" y="300" width="250" height="44" rx="9"/>
  <text class="lbl" x="795" y="327" text-anchor="middle">Wishbone bus (32-bit CSRs)</text>

  <line class="down" x1="708" y1="344" x2="708" y2="366"/>
  <line class="down" x1="795" y1="344" x2="795" y2="366"/>
  <line class="down" x1="882" y1="344" x2="882" y2="366"/>

  <rect class="box" x="670" y="370" width="76" height="58" rx="9"/>
  <text class="lbl" x="708" y="394" text-anchor="middle" font-size="11.5">ctrl</text>
  <text class="sub" x="708" y="412" text-anchor="middle">scratch</text>

  <rect class="box" x="757" y="370" width="76" height="58" rx="9"/>
  <text class="lbl" x="795" y="394" text-anchor="middle" font-size="11.5">ident_mem</text>
  <text class="sub" x="795" y="412" text-anchor="middle">SoC name</text>

  <rect class="box" x="844" y="370" width="76" height="58" rx="9"/>
  <text class="lbl" x="882" y="394" text-anchor="middle" font-size="11.5">leds</text>
  <text class="sub" x="882" y="412" text-anchor="middle">RGB</text>

  <rect class="host" x="670" y="440" width="250" height="30" rx="7"/>
  <text class="sub" x="795" y="459" text-anchor="middle">FPGA config pins</text>

  <!-- SPIBone wires -->
  <text class="sub" x="475" y="200" text-anchor="middle" fill="#2EAADC" font-weight="700">3-wire SPIBone</text>
  <line class="wire" x1="310" y1="212" x2="640" y2="212"/>
  <text class="sub" x="475" y="228" text-anchor="middle">CS_N: GPIO1 → G3</text>
  <line class="wire" x1="310" y1="240" x2="640" y2="240"/>
  <text class="sub" x="475" y="256" text-anchor="middle">SCK: GPIO2 → F3</text>
  <line class="wire2" x1="316" y1="268" x2="634" y2="268"/>
  <text class="sub" x="475" y="284" text-anchor="middle">DATA: GPIO3 ↔ F2 (bidirectional)</text>
  <text class="sub" x="475" y="312" text-anchor="middle" font-style="italic">same pins carry the bitstream during load</text>

  <!-- Config pins -->
  <line class="cfg" x1="310" y1="455" x2="640" y2="455"/>
  <text class="sub" x="475" y="448" text-anchor="middle">CRESET_N 4 · DONE 5 · STATUS 6 · OSC_EN 19</text>
  <text class="sub" x="475" y="474" text-anchor="middle" font-style="italic">config &amp; status, driven by the loader</text>

  <text class="sub" x="490" y="530" text-anchor="middle">Write = 0x00, read = 0x01, plus a 32-bit address: the whole bus protocol fits in a sentence.</text>
</svg>
