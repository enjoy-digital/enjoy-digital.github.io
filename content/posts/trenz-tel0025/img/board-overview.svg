<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 460" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <style>
      .paper { fill:#0f1218; }
      .t     { fill:#ffffff; font-size:16px; font-weight:700; }
      .lbl   { fill:#cfd2cc; font-size:12.5px; }
      .sub   { fill:#8e96a2; font-size:11px; }
      .py    { fill:#102a33; stroke:#22d3ee; stroke-width:2.5; }
      .pytxt { fill:#67e8f9; font-size:13px; font-weight:700; }
      .box   { fill:#1c2129; stroke:#2EAADC; stroke-width:1.8; }
      .big   { fill:#161b22; stroke:#2EAADC; stroke-width:2.5; }
      .wire2 { fill:none; stroke:#22d3ee; stroke-width:2.5; marker-end:url(#c); marker-start:url(#cs); }
      .link  { fill:none; stroke:#8e96a2; stroke-width:1.8; stroke-dasharray:6 4; }
    </style>
    <marker id="c" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#22d3ee"/></marker>
    <marker id="cs" markerWidth="9" markerHeight="9" refX="0" refY="3" orient="auto"><path d="M7,0 L0,3 L7,6 Z" fill="#22d3ee"/></marker>
  </defs>

  <rect class="paper" x="0" y="0" width="980" height="460"/>
  <text class="t" x="490" y="34" text-anchor="middle" fill="#2EAADC">Trenz TEL0025: a Certus-NX, 32 MB of HyperRAM, and Linux on top</text>

  <!-- FPGA -->
  <rect class="big" x="60" y="70" width="480" height="320" rx="12"/>
  <text class="t"   x="300" y="98" text-anchor="middle">Lattice Certus-NX</text>
  <text class="sub" x="300" y="116" text-anchor="middle">LFD2NX-40 · 75 MHz from a 25 MHz input · 29% of the LUTs</text>

  <rect class="py" x="85" y="135" width="200" height="60" rx="9"/>
  <text class="pytxt" x="185" y="160" text-anchor="middle">VexRiscv-SMP</text>
  <text class="sub"   x="185" y="180" text-anchor="middle">1 core · rv32ima · sv32 MMU</text>

  <rect class="box" x="315" y="135" width="200" height="60" rx="9"/>
  <text class="lbl" x="415" y="160" text-anchor="middle">LiteX SoC</text>
  <text class="sub" x="415" y="180" text-anchor="middle">Wishbone · UART · SDCard</text>

  <rect class="box" x="85" y="230" width="430" height="60" rx="9"/>
  <text class="lbl" x="300" y="255" text-anchor="middle">HyperRAM core (hyperbus.py)</text>
  <text class="sub" x="300" y="275" text-anchor="middle">2:1 clocking · short CS gaps · command continuation</text>

  <rect class="box" x="85" y="315" width="130" height="50" rx="9"/>
  <text class="sub" x="150" y="337" text-anchor="middle">FT2232</text>
  <text class="sub" x="150" y="353" text-anchor="middle">serial console</text>

  <rect class="box" x="235" y="315" width="130" height="50" rx="9"/>
  <text class="sub" x="300" y="337" text-anchor="middle">SD card</text>
  <text class="sub" x="300" y="353" text-anchor="middle">rootfs option</text>

  <rect class="box" x="385" y="315" width="130" height="50" rx="9"/>
  <text class="sub" x="450" y="337" text-anchor="middle">RGB LED</text>
  <text class="sub" x="450" y="353" text-anchor="middle">obligatory</text>

  <!-- internal links -->
  <line class="link" x1="185" y1="195" x2="185" y2="230"/>
  <line class="link" x1="415" y1="195" x2="415" y2="230"/>

  <!-- HyperRAM chip -->
  <rect class="py" x="680" y="150" width="240" height="140" rx="12"/>
  <text class="pytxt" x="800" y="200" text-anchor="middle" font-size="16">32 MB HyperRAM</text>
  <text class="sub"   x="800" y="222" text-anchor="middle">main memory for Linux</text>

  <line class="wire2" x1="521" y1="260" x2="674" y2="230"/>
  <text class="sub" x="598" y="222" text-anchor="middle">13 pins</text>
  <text class="sub" x="598" y="290" text-anchor="middle">dq[7:0] · rwds</text>
  <text class="sub" x="598" y="306" text-anchor="middle">clk± · cs_n · rst_n</text>

  <text class="sub" x="490" y="430" text-anchor="middle">Everything Linux touches lives behind those 13 pins: kernel, OpenSBI, initramfs, page cache.</text>
</svg>
