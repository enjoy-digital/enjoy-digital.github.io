<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <style>
      .paper { fill:#0f1218; }
      .t     { fill:#ffffff; font-size:16px; font-weight:700; }
      .lbl   { fill:#cfd2cc; font-size:12.5px; }
      .sub   { fill:#8e96a2; font-size:11px; }
      .py    { fill:#102a33; stroke:#22d3ee; stroke-width:2.5; }
      .pytxt { fill:#67e8f9; font-size:13px; font-weight:700; }
      .box   { fill:#1c2129; stroke:#2EAADC; stroke-width:1.8; }
      .host  { fill:#161b22; stroke:#8e96a2; stroke-width:1.5; stroke-dasharray:5 4; }
      .arr   { fill:none; stroke:#2EAADC; stroke-width:2.5; marker-end:url(#a); }
      .loop  { fill:none; stroke:#22d3ee; stroke-width:2.5; marker-end:url(#c); }
      .step  { fill:#2EAADC; font-size:11px; font-weight:700; }
    </style>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2EAADC"/></marker>
    <marker id="c" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#22d3ee"/></marker>
  </defs>

  <rect class="paper" x="0" y="0" width="980" height="420"/>
  <text class="t" x="490" y="34" text-anchor="middle" fill="#2EAADC">Compile Verilator once, then iterate in seconds</text>

  <!-- Phase 1 -->
  <rect class="host" x="40" y="70" width="250" height="220" rx="12"/>
  <text class="lbl" x="165" y="98" text-anchor="middle">Phase 1 · once</text>

  <rect class="box" x="60" y="116" width="210" height="50" rx="9"/>
  <text class="lbl" x="165" y="137" text-anchor="middle">gen_soc.py</text>
  <text class="sub" x="165" y="155" text-anchor="middle">VexRiscv SoC · 16 MiB main_ram</text>

  <line class="arr" x1="165" y1="166" x2="165" y2="188"/>

  <rect class="box" x="60" y="192" width="210" height="50" rx="9"/>
  <text class="lbl" x="165" y="213" text-anchor="middle">Verilator compile</text>
  <text class="sub" x="165" y="231" text-anchor="middle">obj_dir/Vsim · minutes</text>

  <text class="sub" x="165" y="272" text-anchor="middle" font-style="italic">cached from here on</text>

  <line class="arr" x1="290" y1="180" x2="330" y2="180"/>

  <!-- Phase 2 loop -->
  <rect class="host" x="340" y="70" width="600" height="220" rx="12"/>
  <text class="lbl" x="640" y="98" text-anchor="middle">Phase 2 · every run, seconds</text>

  <rect class="box" x="360" y="130" width="160" height="56" rx="9"/>
  <text class="lbl" x="440" y="153" text-anchor="middle">edit demo / port</text>
  <text class="sub" x="440" y="171" text-anchor="middle">plain C</text>

  <line class="arr" x1="520" y1="158" x2="546" y2="158"/>

  <rect class="box" x="550" y="130" width="160" height="56" rx="9"/>
  <text class="lbl" x="630" y="153" text-anchor="middle">make firmware.bin</text>
  <text class="sub" x="630" y="171" text-anchor="middle">swap sim_main_ram.init</text>

  <line class="arr" x1="710" y1="158" x2="736" y2="158"/>

  <rect class="py" x="740" y="130" width="180" height="56" rx="9"/>
  <text class="pytxt" x="830" y="153" text-anchor="middle">cached Vsim run</text>
  <text class="sub" x="830" y="171" text-anchor="middle">watch UART for markers</text>

  <path class="loop" d="M 830 186 L 830 236 L 440 236 L 440 192"/>
  <text class="sub" x="635" y="228" text-anchor="middle">[rtos] done · [rtos] fail · timeout → exit code</text>

  <!-- pytest -->
  <rect class="box" x="340" y="322" width="600" height="56" rx="9"/>
  <text class="lbl" x="640" y="345" text-anchor="middle">pytest x5 + CI</text>
  <text class="sub" x="640" y="363" text-anchor="middle">each test builds one demo, runs it in the sim, asserts on the captured UART output</text>
  <line class="arr" x1="640" y1="290" x2="640" y2="318"/>
</svg>
