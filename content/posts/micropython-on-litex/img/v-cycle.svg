<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 560" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <style>
      .paper { fill:#0f1218; }
      .t     { fill:#ffffff; font-size:16px; font-weight:700; }
      .lbl   { fill:#cfd2cc; font-size:12.5px; }
      .sub   { fill:#8e96a2; font-size:11px; }
      .py    { fill:#102a33; stroke:#22d3ee; stroke-width:2.5; }
      .pytxt { fill:#67e8f9; font-size:13px; font-weight:700; }
      .box   { fill:#1c2129; stroke:#2EAADC; stroke-width:1.8; }
      .armL  { fill:none; stroke:#2EAADC; stroke-width:2.5; marker-end:url(#a); }
      .armR  { fill:none; stroke:#22d3ee; stroke-width:2.5; marker-end:url(#a); }
      .side  { fill:#2EAADC; font-size:12px; font-weight:700; }
    </style>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2EAADC"/></marker>
  </defs>

  <rect class="paper" x="0" y="0" width="980" height="560"/>
  <text class="t" x="490" y="32" text-anchor="middle" fill="#2EAADC">One language at both ends: describe the SoC in Python, run Python on it</text>

  <!-- arms (behind boxes): left descends, right ascends -->
  <polyline class="armL" points="150,104 250,199 350,294 440,374"/>
  <polyline class="armR" points="540,374 600,294 700,199 820,104"/>

  <!-- side captions -->
  <text class="side" x="120" y="250" transform="rotate(45 120 250)">design, generate</text>
  <text class="side" x="845" y="250" transform="rotate(-45 845 250)">build up, run</text>

  <!-- LEFT arm: from Python down to gates -->
  <g>
    <rect class="py"  x="55"  y="58"  width="200" height="48" rx="9"/>
    <text class="pytxt" x="155" y="78"  text-anchor="middle">Describe the SoC</text>
    <text class="sub"   x="155" y="96"  text-anchor="middle">LiteX + Migen, in Python</text>

    <rect class="box" x="165" y="155" width="180" height="44" rx="9"/>
    <text class="lbl" x="255" y="182" text-anchor="middle">HDL (Verilog)</text>

    <rect class="box" x="265" y="250" width="190" height="44" rx="9"/>
    <text class="lbl" x="360" y="277" text-anchor="middle">Synthesis (Yosys / Vivado)</text>

    <rect class="box" x="345" y="330" width="170" height="44" rx="9"/>
    <text class="lbl" x="430" y="357" text-anchor="middle">Place &amp; route</text>
  </g>

  <!-- BOTTOM vertex -->
  <rect class="box" x="380" y="404" width="220" height="50" rx="10" stroke="#2EAADC" stroke-width="2.5"/>
  <text class="t"   x="490" y="426" text-anchor="middle" fill="#2EAADC">FPGA fabric</text>
  <text class="sub" x="490" y="444" text-anchor="middle">LUTs, gates, the bitstream</text>

  <!-- RIGHT arm: from gates up to Python -->
  <g>
    <rect class="box" x="510" y="330" width="190" height="44" rx="9"/>
    <text class="lbl" x="605" y="357" text-anchor="middle">Softcore CPU (VexRiscv)</text>

    <rect class="box" x="540" y="250" width="170" height="44" rx="9"/>
    <text class="lbl" x="625" y="277" text-anchor="middle">boot + assembly</text>

    <rect class="box" x="640" y="155" width="200" height="44" rx="9"/>
    <text class="lbl" x="740" y="182" text-anchor="middle">C runtime (libc, drivers)</text>

    <rect class="py"  x="725" y="58"  width="200" height="48" rx="9"/>
    <text class="pytxt" x="825" y="78"  text-anchor="middle">Run your Python</text>
    <text class="sub"   x="825" y="96"  text-anchor="middle">MicroPython REPL on the CPU</text>
  </g>

  <text class="sub" x="490" y="510" text-anchor="middle">Python in, Python out. Everything between the two corners is generated for you.</text>
</svg>
