<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <style>
      .paper { fill:#0f1218; }
      .t     { fill:#ffffff; font-size:15px; font-weight:700; }
      .sub   { fill:#8e96a2; font-size:11px; }
      .cyan  { fill:#2EAADC; font-size:13px; font-weight:700; }
      .lbl   { fill:#cfd2cc; font-size:12px; }
      .src   { fill:#1a1b17; stroke:#2EAADC; stroke-width:1.8; }
      .core  { fill:#102a33; stroke:#22d3ee; stroke-width:2.5; }
      .out   { fill:#1c2129; stroke:#2EAADC; stroke-width:1.8; }
      .wire  { stroke:#2EAADC; stroke-width:2.2; fill:none; marker-end:url(#a); }
    </style>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2EAADC"/></marker>
  </defs>

  <rect class="paper" x="0" y="0" width="960" height="470"/>
  <text class="t" x="480" y="30" text-anchor="middle" fill="#2EAADC">One board, many ways to discipline its clock</text>

  <!-- sources -->
  <text class="sub" x="135" y="66" text-anchor="middle">time / frequency source</text>
  <g>
    <rect class="src" x="30" y="80"  width="210" height="40" rx="8"/>
    <text class="cyan" x="46" y="105">White Rabbit  (sub-ns)</text>
    <rect class="src" x="30" y="132" width="210" height="40" rx="8"/>
    <text class="lbl"  x="46" y="157">Ethernet PTP grandmaster</text>
    <rect class="src" x="30" y="184" width="210" height="40" rx="8"/>
    <text class="lbl"  x="46" y="209">PCIe PTM  (from host)</text>
    <rect class="src" x="30" y="236" width="210" height="40" rx="8"/>
    <text class="lbl"  x="46" y="261">External 10 MHz + PPS</text>
  </g>

  <!-- core -->
  <rect class="core" x="350" y="135" width="250" height="120" rx="12"/>
  <text class="t"    x="475" y="170" text-anchor="middle">LiteX M2SDR</text>
  <text class="cyan" x="475" y="192" text-anchor="middle">clock discipline</text>
  <text class="sub"  x="475" y="214" text-anchor="middle">SI5351 + AD9361 reference</text>
  <text class="sub"  x="475" y="234" text-anchor="middle">(SI5351B VCXO loop optional)</text>

  <!-- sources -> core -->
  <line class="wire" x1="240" y1="100" x2="350" y2="165"/>
  <line class="wire" x1="240" y1="152" x2="350" y2="185"/>
  <line class="wire" x1="240" y1="204" x2="350" y2="205"/>
  <line class="wire" x1="240" y1="256" x2="350" y2="225"/>

  <!-- outputs -->
  <text class="sub" x="810" y="66" text-anchor="middle">what you get</text>
  <g>
    <rect class="out" x="700" y="100" width="230" height="40" rx="8"/>
    <text class="lbl" x="716" y="125">PPS out / 10 MHz out</text>
    <rect class="out" x="700" y="152" width="230" height="40" rx="8"/>
    <text class="lbl" x="716" y="177">disciplined RFIC sample clock</text>
    <rect class="out" x="700" y="204" width="230" height="40" rx="8"/>
    <text class="lbl" x="716" y="223">many M2SDRs on one</text>
    <text class="lbl" x="716" y="238">timebase (coherent MIMO)</text>
  </g>

  <!-- core -> outputs -->
  <line class="wire" x1="600" y1="175" x2="700" y2="120"/>
  <line class="wire" x1="600" y1="195" x2="700" y2="172"/>
  <line class="wire" x1="600" y1="215" x2="700" y2="222"/>

  <text class="sub" x="480" y="320" text-anchor="middle">White Rabbit and PTP arrive over the SFP / Ethernet on the baseboard; PTM rides the PCIe link; 10 MHz/PPS via uFL.</text>
  <text class="sub" x="480" y="340" text-anchor="middle">FEMTO-ST's adaptation removed the need for a dedicated VCXO, which is what brought White Rabbit to the M2SDR.</text>
</svg>
