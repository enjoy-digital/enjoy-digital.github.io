<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 470" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <style>
      .paper { fill:#171814; }
      .t     { fill:#ffffff; font-size:15px; font-weight:700; }
      .sub   { fill:#9aa09a; font-size:11px; }
      .cyan  { fill:#2EAADC; font-size:13px; font-weight:700; }
      .lbl   { fill:#cfd2cc; font-size:12.5px; }
      .wire  { stroke:#2EAADC; stroke-width:2; fill:none; }
      .arr   { stroke:#2EAADC; stroke-width:2; fill:none; marker-end:url(#a); marker-start:url(#b); }
    </style>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#2EAADC"/></marker>
    <marker id="b" markerWidth="9" markerHeight="9" refX="2" refY="3" orient="auto"><path d="M7,0 L0,3 L7,6 Z" fill="#2EAADC"/></marker>
  </defs>

  <rect class="paper" x="0" y="0" width="920" height="470"/>
  <text class="t" x="460" y="30" text-anchor="middle" fill="#2EAADC">Everything is text and a command. That is exactly what an agent wants.</text>

  <!-- agent -->
  <rect x="40" y="150" width="190" height="150" rx="12" fill="#102a33" stroke="#22d3ee" stroke-width="2.5"/>
  <text class="cyan" x="135" y="205" text-anchor="middle">AI agent</text>
  <text class="sub"  x="135" y="228" text-anchor="middle">reads text,</text>
  <text class="sub"  x="135" y="246" text-anchor="middle">runs commands</text>

  <!-- tools column -->
  <g>
    <rect x="330" y="60"  width="250" height="42" rx="8" fill="#1a1b17" stroke="#2EAADC"/>
    <text class="lbl" x="345" y="86">Etherbone bridge  ·  litex_server</text>
    <rect x="330" y="110" width="250" height="42" rx="8" fill="#1a1b17" stroke="#2EAADC"/>
    <text class="lbl" x="345" y="136">PCIe bridge  ·  rescan.py</text>
    <rect x="330" y="160" width="250" height="42" rx="8" fill="#1a1b17" stroke="#2EAADC"/>
    <text class="lbl" x="345" y="186">JTAG  ·  UART / crossover</text>
    <rect x="330" y="210" width="250" height="42" rx="8" fill="#1a1b17" stroke="#2EAADC"/>
    <text class="lbl" x="345" y="236">CSR read/write  ·  RemoteClient</text>
    <rect x="330" y="260" width="250" height="42" rx="8" fill="#1a1b17" stroke="#2EAADC"/>
    <text class="lbl" x="345" y="286">LiteScope  ·  litescope_cli</text>
    <rect x="330" y="310" width="250" height="42" rx="8" fill="#1a1b17" stroke="#2EAADC"/>
    <text class="lbl" x="345" y="336">build / load  ·  pytest / sim</text>
  </g>

  <!-- agent <-> tools -->
  <line class="arr" x1="230" y1="225" x2="330" y2="180"/>
  <line class="arr" x1="230" y1="235" x2="330" y2="285"/>

  <!-- tools -> board -->
  <line class="wire" x1="580" y1="81"  x2="690" y2="200"/>
  <line class="wire" x1="580" y1="131" x2="690" y2="210"/>
  <line class="wire" x1="580" y1="181" x2="690" y2="215"/>
  <line class="wire" x1="580" y1="231" x2="690" y2="220"/>
  <line class="wire" x1="580" y1="281" x2="690" y2="228"/>
  <line class="wire" x1="580" y1="331" x2="690" y2="238"/>

  <!-- board -->
  <rect x="690" y="150" width="190" height="150" rx="12" fill="#1e1f1b" stroke="#2EAADC" stroke-width="2.5"/>
  <text class="cyan" x="785" y="200" text-anchor="middle">LiteX SoC</text>
  <text class="sub"  x="785" y="222" text-anchor="middle">on the FPGA</text>
  <text class="sub"  x="785" y="240" text-anchor="middle">on the bench</text>

  <text class="sub" x="460" y="410" text-anchor="middle">No GUI, no proprietary IDE in the loop. Plug the board in, and the agent can drive all of it.</text>
</svg>
