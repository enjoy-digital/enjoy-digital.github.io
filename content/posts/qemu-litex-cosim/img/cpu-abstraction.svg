<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <style>
      .paper { fill:#171814; }
      .t     { fill:#ffffff; font-size:17px; font-weight:700; }
      .sub   { fill:#9aa09a; font-size:11px; }
      .tag   { fill:#9aa09a; font-size:10.5px; }
      .cyan  { fill:#2EAADC; font-size:13px; font-weight:700; }
      .lbl   { fill:#cfd2cc; font-size:12.5px; }
      .mono  { fill:#cfd2cc; font-size:12px; }
      .arr   { stroke:#2EAADC; stroke-width:2; fill:none; marker-end:url(#a); }
    </style>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#2EAADC"/>
    </marker>
  </defs>

  <rect class="paper" x="0" y="0" width="920" height="560"/>

  <text class="t" x="460" y="32" text-anchor="middle" fill="#2EAADC">In LiteX, a CPU is a contract. QEMU just signs it.</text>

  <!-- CPU cards (interchangeable) -->
  <!-- soft cores -->
  <g>
    <rect x="24"  y="64" width="150" height="78" rx="10" fill="#1e1f1b" stroke="#2EAADC" stroke-width="1.6"/>
    <text class="lbl"  x="99"  y="98"  text-anchor="middle">VexRiscv</text>
    <text class="tag"  x="99"  y="118" text-anchor="middle">soft core · Verilog</text>
  </g>
  <g>
    <rect x="190" y="64" width="150" height="78" rx="10" fill="#1e1f1b" stroke="#2EAADC" stroke-width="1.6"/>
    <text class="lbl"  x="265" y="98"  text-anchor="middle">NaxRiscv</text>
    <text class="tag"  x="265" y="118" text-anchor="middle">soft core · SpinalHDL</text>
  </g>
  <g>
    <rect x="356" y="64" width="150" height="78" rx="10" fill="#1e1f1b" stroke="#2EAADC" stroke-width="1.6"/>
    <text class="lbl"  x="431" y="98"  text-anchor="middle">Rocket</text>
    <text class="tag"  x="431" y="118" text-anchor="middle">soft core · Chisel</text>
  </g>
  <!-- hard core -->
  <g>
    <rect x="522" y="64" width="150" height="78" rx="10" fill="#1e1f1b" stroke="#2EAADC" stroke-width="1.6"/>
    <text class="lbl"  x="597" y="98"  text-anchor="middle">Zynq / ZynqMP</text>
    <text class="tag"  x="597" y="118" text-anchor="middle">hard core · PS silicon</text>
  </g>
  <!-- emulator (highlighted) -->
  <g>
    <rect x="688" y="58" width="208" height="90" rx="10" fill="#102a33" stroke="#22d3ee" stroke-width="2.5"/>
    <text class="cyan" x="792" y="92"  text-anchor="middle">QEMU RISC-V</text>
    <text class="tag"  x="792" y="112" text-anchor="middle" fill="#67e8f9">emulator · no RTL</text>
    <text class="tag"  x="792" y="130" text-anchor="middle" fill="#67e8f9">(this post)</text>
  </g>

  <!-- converging arrows into the abstraction bar -->
  <line class="arr" x1="99"  y1="142" x2="300" y2="214"/>
  <line class="arr" x1="265" y1="142" x2="380" y2="214"/>
  <line class="arr" x1="431" y1="142" x2="455" y2="214"/>
  <line class="arr" x1="597" y1="142" x2="540" y2="214"/>
  <line class="arr" x1="792" y1="148" x2="620" y2="214"/>

  <!-- the CPU abstraction bar -->
  <rect x="60" y="218" width="800" height="92" rx="12" fill="#1a1b17" stroke="#2EAADC" stroke-width="2"/>
  <text class="t"    x="460" y="246" text-anchor="middle">class CPU  (litex/soc/cores/cpu)</text>
  <text class="mono" x="460" y="272" text-anchor="middle">the same contract for every core:</text>
  <text class="cyan" x="460" y="295" text-anchor="middle">periph_buses  (Wishbone / AXI master)  ·  interrupt  ·  reset  ·  mem_map</text>

  <!-- arrow down to SoC -->
  <line class="arr" x1="460" y1="310" x2="460" y2="372"/>
  <text class="sub" x="476" y="348">add_cpu() wires the bus master into the interconnect</text>

  <!-- LiteX SoC -->
  <rect x="60" y="376" width="800" height="92" rx="12" fill="#1e1f1b" stroke="#2EAADC" stroke-width="2"/>
  <text class="t"    x="460" y="404" text-anchor="middle" fill="#2EAADC">LiteX SoC</text>
  <text class="lbl"  x="460" y="430" text-anchor="middle">interconnect  ·  CSR bus</text>
  <text class="mono" x="460" y="452" text-anchor="middle">UART   ·   Ethernet   ·   DMA   ·   your IP   ·   main RAM</text>

  <text class="sub" x="460" y="500" text-anchor="middle">Swap the core on top and nothing below changes. QEMU is one more option, not a separate project.</text>
</svg>
